<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PoppMesh</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
    background: #0c0e12;
    color: #e8e8e8;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  header {
    font-weight: 600;
    letter-spacing: 0.5px;
    font-size: 15px;
  }

  main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 80px;
    flex-wrap: wrap;
    max-width: 1100px;
    width: 100%;
  }

  .text { max-width: 480px; }

  h1 {
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 500;
    line-height: 1.25;
    letter-spacing: -0.5px;
  }

  canvas.sphere {
    width: 360px;
    height: 360px;
    flex-shrink: 0;
  }

  footer {
    font-size: 13px;
    color: #666;
  }

  @media (max-width: 700px) {
    main { gap: 30px; flex-direction: column-reverse; align-items: flex-start; }
    canvas.sphere { width: 260px; height: 260px; }
  }
</style>
</head>
<body>
  <header>PoppMesh</header>

  <main>
    <div class="text">
      <h1>A network for humanity.</h1>
    </div>
    <canvas class="sphere" id="sphere" width="720" height="720"></canvas>
  </main>

  <footer>© PoppMesh Inc.</footer>

<script>
(() => {
  const canvas = document.getElementById('sphere');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = W * 0.38;

  // Generate evenly distributed points on a sphere (golden spiral / Fibonacci)
  const N = 90;
  const points = [];
  const phi = Math.PI * (3 - Math.sqrt(5)); // golden angle
  for (let i = 0; i < N; i++) {
    const y = 1 - (i / (N - 1)) * 2;
    const r = Math.sqrt(1 - y * y);
    const theta = phi * i;
    points.push({
      x: Math.cos(theta) * r,
      y: y,
      z: Math.sin(theta) * r,
    });
  }

  // Pre-compute neighbor pairs (mesh edges) — connect points within angular distance
  const edges = [];
  const NEIGHBOR_THRESHOLD = 0.32; // dot product threshold (1=same, 0=perpendicular)
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const a = points[i], b = points[j];
      const dot = a.x * b.x + a.y * b.y + a.z * b.z;
      if (dot > 1 - NEIGHBOR_THRESHOLD) edges.push([i, j]);
    }
  }

  let angle = 0;

  function rotateY(p, ang) {
    const cos = Math.cos(ang), sin = Math.sin(ang);
    return {
      x: p.x * cos + p.z * sin,
      y: p.y,
      z: -p.x * sin + p.z * cos,
    };
  }

  function rotateX(p, ang) {
    const cos = Math.cos(ang), sin = Math.sin(ang);
    return {
      x: p.x,
      y: p.y * cos - p.z * sin,
      z: p.y * sin + p.z * cos,
    };
  }

  function project(p) {
    return { sx: cx + p.x * R, sy: cy + p.y * R, z: p.z };
  }

  let pulses = [];

  function spawnPulse() {
    pulses.push({ r: R * 0.05, opacity: 0.35 });
  }

  setInterval(spawnPulse, 1300);

  function frame() {
    ctx.clearRect(0, 0, W, H);

    angle += 0.0024;
    const tilt = -0.35;

    // Transform all points
    const proj = points.map(p => project(rotateX(rotateY(p, angle), tilt)));

    // Pulse rings
    for (let i = pulses.length - 1; i >= 0; i--) {
      const p = pulses[i];
      ctx.strokeStyle = `rgba(92,243,196,${p.opacity})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(cx, cy, p.r, 0, Math.PI * 2);
      ctx.stroke();
      p.r += R * 0.005;
      p.opacity -= 0.003;
      if (p.opacity <= 0) pulses.splice(i, 1);
    }

    // Edges (mesh links) — fade by average z
    for (const [i, j] of edges) {
      const a = proj[i], b = proj[j];
      const avgZ = (a.z + b.z) / 2;
      const front = (avgZ + 1) / 2; // 0 (back) → 1 (front)
      ctx.strokeStyle = `rgba(92,243,196,${front * 0.35})`;
      ctx.lineWidth = front * 1.2;
      ctx.beginPath();
      ctx.moveTo(a.sx, a.sy);
      ctx.lineTo(b.sx, b.sy);
      ctx.stroke();
    }

    // Nodes — sort by z so front draws on top
    const indexed = proj.map((p, i) => ({ ...p, i }));
    indexed.sort((a, b) => a.z - b.z);
    for (const p of indexed) {
      const front = (p.z + 1) / 2;
      const radius = 1 + front * 3;
      ctx.fillStyle = `rgba(92,243,196,${0.35 + front * 0.6})`;
      if (front > 0.85) {
        ctx.shadowColor = '#5cf3c4';
        ctx.shadowBlur = 12;
      } else {
        ctx.shadowBlur = 0;
      }
      ctx.beginPath();
      ctx.arc(p.sx, p.sy, radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Core glow
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.25);
    gradient.addColorStop(0, 'rgba(92,243,196,0.18)');
    gradient.addColorStop(1, 'rgba(92,243,196,0)');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.25, 0, Math.PI * 2);
    ctx.fill();

    requestAnimationFrame(frame);
  }

  frame();
})();
</script>
</body>
</html>
